name: Build wikilite

on:
  push:
  release:
    types: [published]

jobs:
  build-termux-arm64:
    name: Build for Termux ARM64
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Clone termux-packages
        run: |
          git clone --depth=1 https://github.com/termux/termux-packages.git

      - name: Copy package files
        run: |
          mkdir -p termux-packages/packages/
          cp -r ./termux/packages/* termux-packages/packages/

      - name: Build wikilite package
        run: |
          cd termux-packages
          ./scripts/run-docker.sh ./build-package.sh wikilite

      - name: Rename and upload ARM64 package
        run: |
          cd termux-packages/output
          DEB_FILE=$(ls wikilite_*_aarch64.deb)
          cp "$DEB_FILE" ../../wikilite-termux-arm64.deb

      - name: Upload termux package artifact
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ github.event.release.upload_url }}
          asset_path: wikilite-termux-arm64.deb
          asset_name: wikilite-termux-arm64.deb
          asset_content_type: application/vnd.debian.binary-package
